<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C6A15B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield background -->
  <path d="M100 10 L180 40 L180 90 C180 140 140 180 100 190 C60 180 20 140 20 90 L20 40 Z" 
        fill="url(#goldGradient)" 
        stroke="#C6A15B" 
        stroke-width="2"/>
  
  <!-- Inner shield -->
  <path d="M100 25 L165 50 L165 90 C165 130 135 160 100 175 C65 160 35 130 35 90 L35 50 Z" 
        fill="none" 
        stroke="#0B0B0B" 
        stroke-width="1.5"
        opacity="0.3"/>
  
  <!-- K letter -->
  <text x="100" y="115" 
        font-family="Arial, sans-serif" 
        font-size="60" 
        font-weight="bold" 
        fill="#0B0B0B" 
        text-anchor="middle">K</text>
  
  <!-- Security text -->
  <text x="100" y="140" 
        font-family="Arial, sans-serif" 
        font-size="14" 
        font-weight="bold" 
        fill="#0B0B0B" 
        text-anchor="middle">SECURITY</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="60" r="8" fill="#0B0B0B" opacity="0.2"/>
  <circle cx="70" cy="70" r="4" fill="#0B0B0B" opacity="0.15"/>
  <circle cx="130" cy="70" r="4" fill="#0B0B0B" opacity="0.15"/>
</svg>